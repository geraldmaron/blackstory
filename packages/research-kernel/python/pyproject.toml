[project]
name = "research-kernel"
version = "0.1.0"
description = "Generated Pydantic contracts for the shared research kernel"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.11.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/research_kernel"]
