# BlackStory shared product constitution loaders for Python workers.
# Validates and reads the same packages/schemas/constitution JSON as TypeScript.
[project]
name = "black-book-constitution"
version = "0.0.0"
description = "Read-only loaders for the BlackStory product constitution"
requires-python = ">=3.12"
dependencies = [
  "jsonschema>=4.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/black_book_constitution"]
