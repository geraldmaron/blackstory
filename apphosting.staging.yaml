# Staging overrides for backend black-book-web-staging (environment name: staging).
# Merged over root apphosting.yaml at build time. Same Supabase SoR as production
# (not a security boundary — single GCP project). No secret VALUES here.
#
# Requires the App Hosting backend Environment name set to `staging`.

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 20
  cpu: 1
  memoryMiB: 256

env:
  - variable: NEXT_PUBLIC_APP_ENV
    value: staging
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY
    secret: web-staging-app-check-site-key
    availability:
      - BUILD
      - RUNTIME
  - variable: SENTRY_DSN
    secret: web-staging-sentry-dsn
    availability:
      - RUNTIME
