# Production template for project black-book-efaaf and proposed backend black-book-web-production.
# Keep synchronized with apphosting.yaml until App Hosting backend creation after Blaze.
# Backend runtime: web-runtime@black-book-efaaf.iam.gserviceaccount.com.
# No secret values here — only Secret Manager references by name (resolved at deploy time).
# Production rollouts are triggered explicitly by GitHub Actions with protected-environment
# approval (ADR-006); automatic App Hosting rollouts are disabled.
#
# production caps — minInstances=2, maxInstances=6, concurrency=40, memoryMiB=384.
# Post-deploy validation:
#   gcloud run services describe black-book-web-production --region=REGION \
#     --format='yaml(spec.template.spec.containerConcurrency,spec.template.metadata.annotations)'

runConfig:
  minInstances: 2
  maxInstances: 6
  concurrency: 40
  cpu: 1
  memoryMiB: 384

env:
  - variable: NEXT_PUBLIC_APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: PUBLIC_READ_API_DISABLED
    value: '0'
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: black-book-efaaf
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: black-book-efaaf.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: black-book-efaaf.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: '332234323945'
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: '1:332234323945:web:17be349ebc9c029b3bfd78'
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCS6qbiHo3KYAkMOhVbuORCwNa9PNbChFU
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY
    secret: web-production-app-check-site-key
    availability:
      - BUILD
      - RUNTIME
  - variable: SENTRY_DSN
    secret: web-production-sentry-dsn
    availability:
      - RUNTIME
