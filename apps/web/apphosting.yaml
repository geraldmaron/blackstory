# Firebase App Hosting base configuration for the production apps/web backend.
#
# Project: black-book-efaaf (332234323945)
# Proposed backend: black-book-web-production (create after Blaze upgrade)
# Existing Hosting site: black-book-efaaf.web.app (does not prove an App Hosting backend exists)
# Registered web app: 1:332234323945:web:17be349ebc9c029b3bfd78 (Black Book Web)
#
# Isolation notes:
#   - Set the backend runtime identity to web-runtime@black-book-efaaf.iam.gserviceaccount.com
#     at backend creation. The identity has no private-evidence/quarantine access or publish permission.
#   - No secret VALUES appear in this repo. Server-only values use Secret Manager via `secret:`.
#   - NEXT_PUBLIC_FIREBASE_* values are public client identifiers (not secrets).
#
# Staging is an optional separately named backend in this same production project, not a security boundary.
# Backend creation is blocked until the project is on Blaze (firebaseapphosting.googleapis.com).
#
# BB-022 runtime hardening — conservative defaults (overridden per environment):
#   Post-deploy validation (replace BACKEND and REGION after backend creation):
#     gcloud run services describe BACKEND --region=REGION \
#       --format='yaml(spec.template.spec.containerConcurrency,spec.template.metadata.annotations)'
#   Expect: containerConcurrency=40, maxScale annotation <= 6 for production backends.
#
# BB-062: automatic App Hosting rollouts are disabled. Production/staging traffic
# changes run only via explicit GitHub Actions promote (see docs/runbooks/production-release.md).

runConfig:
  minInstances: 1
  maxInstances: 6
  concurrency: 40
  cpu: 1
  memoryMiB: 384

env:
  - variable: NEXT_PUBLIC_APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: PUBLIC_READ_API_DISABLED
    value: '0'
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: black-book-efaaf
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: black-book-efaaf.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: black-book-efaaf.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: '332234323945'
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: '1:332234323945:web:17be349ebc9c029b3bfd78'
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCS6qbiHo3KYAkMOhVbuORCwNa9PNbChFU
    availability:
      - BUILD
      - RUNTIME
  # App Check site key — create in console; prefer Secret Manager if treated as sensitive ops config.
  - variable: NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY
    secret: web-production-app-check-site-key
    availability:
      - BUILD
      - RUNTIME
  - variable: SENTRY_DSN
    secret: web-production-sentry-dsn
    availability:
      - RUNTIME
