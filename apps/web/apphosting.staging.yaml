# Optional staging template in production project black-book-efaaf.
# Proposed backend: black-book-web-staging (same project; not a security boundary).
# Uses the same BlackStory Web app registration; distinct Secret Manager names only.
# Backend runtime: web-runtime@black-book-efaaf.iam.gserviceaccount.com.
# No secret values here — only Secret Manager references by name (resolved at deploy time).
#
# tighter staging caps than production (maxInstances=2, concurrency=20, memoryMiB=256).
# Post-deploy: gcloud run services describe black-book-web-staging --region=REGION \
#   --format='value(spec.template.metadata.annotations.autoscaling\.knative\.dev/maxScale)'
#
# automatic App Hosting rollouts are disabled. Staging promotes only via
# .github/workflows/deploy-staging.yml (pinned SHA + explicit promote dry-run/live step).

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 20
  cpu: 1
  memoryMiB: 256

env:
  - variable: NEXT_PUBLIC_APP_ENV
    value: staging
    availability:
      - BUILD
      - RUNTIME
  - variable: PUBLIC_READ_API_DISABLED
    value: '0'
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: black-book-efaaf
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: black-book-efaaf.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: black-book-efaaf.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: '332234323945'
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: '1:332234323945:web:17be349ebc9c029b3bfd78'
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCS6qbiHo3KYAkMOhVbuORCwNa9PNbChFU
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY
    secret: web-staging-app-check-site-key
    availability:
      - BUILD
      - RUNTIME
  - variable: SENTRY_DSN
    secret: web-staging-sentry-dsn
    availability:
      - RUNTIME
