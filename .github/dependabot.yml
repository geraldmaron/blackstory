# Dependabot version updates + security PR alerts (BB-009).
# Alerts enable automatically once the repo exists on GitHub with Dependabot allowed.
# Grouped weekly bumps keep review load manageable; lockfiles stay the source of truth.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      eslint-prettier:
        patterns:
          - 'eslint*'
          - 'prettier'
          - '@typescript-eslint/*'
      typescript-tooling:
        patterns:
          - 'typescript'
          - 'tsx'
          - '@types/*'

  - package-ecosystem: npm
    # apps/mobile keeps its own npm lockfile — deliberately excluded from the root pnpm
    # workspace (pnpm-workspace.yaml `!apps/mobile`) — so it needs its own Dependabot entry.
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
      - mobile

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # Prefer Dependabot PRs that bump the pinned SHA comments in workflows.
    # Policy checker still requires immutable 40-char commit SHAs.
