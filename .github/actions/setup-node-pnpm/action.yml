# Shared Node + pnpm install for CI/security/deploy jobs.
# Pins match .github/workflows; keep SHAs in sync when bumping actions.
name: Setup Node and pnpm
description: Install pnpm and Node (.nvmrc), optionally with a frozen lockfile install

inputs:
  install:
    description: When true, run pnpm install --frozen-lockfile
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: 9.12.3
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: .nvmrc
        cache: pnpm
    - name: Install JavaScript dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
